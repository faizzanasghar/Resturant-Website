<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Delizia Craft Pizza</title>
    <link rel="stylesheet" href="styles-modern.css">
    <style>
        .admin-section {
            padding: 40px 0;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .panel {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .panel h3 {
            border-bottom: 2px solid #ff6347;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .order-card {
            border: 1px solid #eee;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 4px;
        }

        .order-status {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            background: #e3f2fd;
            color: #2196f3;
        }

        .product-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: 0.8em;
        }

        .btn-danger {
            background-color: #f44336;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn {
            padding: 10px 20px;
            background-color: #ff6347;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <a href="practicepage.html" class="logo">
                <img src="images/webpage logo2.jpg" alt="Delizia Craft" class="logo-img">
            </a>
            <ul>
                <li><a href="practicepage.html">Home</a></li>
                <li><a href="products.html">Menu</a></li>
                <li><a href="admin.html" class="active">Dashboard</a></li>
                <li><a href="#" onclick="api.logout(); window.location.href='login.html'">Logout</a></li>
            </ul>
        </div>
    </nav>

    <section class="admin-section">
        <div class="container">
            <div class="admin-header">
                <h2>Admin Dashboard</h2>
                <div id="adminInfo"></div>
            </div>

            <div class="dashboard-grid">
                <!-- Product Management -->
                <div class="panel">
                    <h3>Add New Product</h3>
                    <form id="addProductForm">
                        <input type="text" id="prodName" placeholder="Product Name" required>
                        <select id="prodCategory" required>
                            <option value="Pizza">Pizza</option>
                            <option value="Burger">Burger</option>
                            <option value="Beverages">Beverages</option>
                        </select>
                        <input type="number" id="prodPrice" placeholder="Price" step="0.01" required>
                        <textarea id="prodDesc" placeholder="Description" rows="3" required></textarea>
                        <input type="text" id="prodImage" placeholder="Image URL (e.g., images/pizza.jpg)" required>
                        <button type="submit" class="btn">Add Product</button>
                    </form>

                    <h3 style="margin-top: 30px;">Manage Products</h3>
                    <div id="productList">
                        <!-- Products rendered here -->
                    </div>
                </div>

                <!-- Orders View -->
                <div class="panel">
                    <h3>Customer Orders</h3>
                    <div id="ordersList">
                        <!-- Orders rendered here -->
                        <p>Loading orders...</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="api-client.js"></script>
    <script>
        // Auth Check
        if (!api.isAuthenticated() || !api.isAdmin()) {
            window.location.href = 'login.html';
        }

        const adminInfo = document.getElementById('adminInfo');
        if (api.user) {
            adminInfo.textContent = `Logged in as: ${api.user.firstname} (Admin)`;
        }

        // --- Products Logic ---

        async function loadProducts() {
            const products = await api.getMenu();
            const container = document.getElementById('productList');
            container.innerHTML = '';

            products.forEach(p => {
                const div = document.createElement('div');
                div.className = 'product-list-item';
                div.innerHTML = `
                    <span><b>${p.name}</b> ($${p.price})</span>
                    <button class="btn-sm btn-danger" onclick="deleteProduct(${p.id})">Delete</button>
                `;
                container.appendChild(div);
            });
        }

        async function deleteProduct(id) {
            if (confirm('Are you sure you want to delete this product?')) {
                await api.deleteProduct(id);
                loadProducts();
                showNotification('Product deleted', 'success');
            }
        }

        // Expose to window for onclick
        window.deleteProduct = deleteProduct;

        document.getElementById('addProductForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const product = {
                name: document.getElementById('prodName').value,
                category: document.getElementById('prodCategory').value,
                price: document.getElementById('prodPrice').value,
                description: document.getElementById('prodDesc').value,
                image_url: document.getElementById('prodImage').value
            };

            try {
                await api.addProduct(product);
                e.target.reset();
                loadProducts();
                showNotification('Product added successfully', 'success');
            } catch (err) {
                showNotification(err.message, 'error');
            }
        });

        // --- Orders Logic ---

        async function loadOrders() {
            try {
                const orders = await api.getAllOrders();
                const container = document.getElementById('ordersList');
                container.innerHTML = '';

                if (!orders || orders.length === 0) {
                    container.innerHTML = '<p>No orders found.</p>';
                    return;
                }

                orders.forEach(order => {
                    const div = document.createElement('div');
                    div.className = 'order-card';
                    const date = new Date(order.created_at).toLocaleString();
                    const itemsList = order.items.map(i => `<li>${i.quantity}x ${i.name}</li>`).join('');

                    div.innerHTML = `
                        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                            <strong>Order #${order.id}</strong>
                            <span class="order-status">${order.status}</span>
                        </div>
                        <div style="font-size:0.9em; color:#666; margin-bottom:10px;">
                            Customer: ${order.username} <br>
                            Date: ${date}
                        </div>
                        <ul style="margin: 10px 0; padding-left: 20px; font-size: 0.9em;">${itemsList}</ul>
                        <div style="text-align:right; font-weight:bold; margin-top:10px; border-top:1px solid #eee; padding-top:5px;">
                            Total: $${order.total_price}
                        </div>
                    `;
                    container.appendChild(div);
                });
            } catch (err) {
                console.error(err);
                document.getElementById('ordersList').innerHTML = '<p class="error-text">Failed to load orders.</p>';
            }
        }

        // Init
        loadProducts();
        loadOrders();
    </script>
</body>

</html>

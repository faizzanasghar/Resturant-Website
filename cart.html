<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - Delizia Craft Pizza</title>
    <link rel="stylesheet" href="styles-modern.css">
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container">
            <a href="practicepage.html" class="logo">
                <img src="images/webpage logo2.jpg" alt="Delizia Craft" class="logo-img"> 
              </a>
            <ul>
                <li><a href="practicepage.html">Home</a></li>
                <li><a href="products.html">Menu</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="contact.html">Contact Us</a></li>
                <li><a href="reviews.html">Reviews</a></li>
                <li><a href="login.html">Log In</a></li>
                <li><a href="cart.html">Cart</a></li>
            </ul>
        </div>
    </nav>

    <!-- Cart Section -->
    <section id="cart" class="cart">
        <div class="container">
            <h2>Your Cart</h2>
            
            <table id="cart-table">
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Total</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Cart items will be populated here by JavaScript -->
                </tbody>
            </table>

            <div class="cart-summary">
                <h3>Cart Summary</h3>
                <p>Total: <span id="total-price">$0.00</span></p>
                <div class="cart-actions">
                    <button id="checkout-btn" class="checkout-btn">Proceed to Checkout</button>
                    <button id="clear-cart-btn" class="clear-cart-btn">Clear Cart</button>
                    <a href="products.html" class="continue-shopping">Continue Shopping</a>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 Delizia Craft Pizza. All rights reserved.</p>
    </footer>

    <script src="cart-functions.js"></script>
    <script src="api-client.js"></script>  
</body>
</html>
